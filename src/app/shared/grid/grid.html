<div class="grid-table">
  <table mat-table [dataSource]="itens" class="mat-elevation-z1">

    <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
      <th
      mat-header-cell
      *matHeaderCellDef
      [class.mat-column-low]="column.key === 'id'"
      [class.mat-column-medium]="column.key === 'nome'"
      [class.mat-column-large]="column.key === 'descricao'"
      [class.mat-column-low]="column.key === 'tipo'"
      [class.mat-column-low]="column.key === 'unidade'"
      [class.mat-column-action]="column.key === 'acao'"
      >{{ column.label }}</th>
      <td mat-cell *matCellDef="let item"
      >{{ item[column.key] }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
